name: Build and deploy Python app to Azure Web App - buapapiv1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 🚀 CAMBIO CRÍTICO: Usa 3.12 para velocidad y estabilidad

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
                
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          # 🛡️ EXCLUSIONES ESTRATÉGICAS: No subas basura al servidor
          path: |
            .
            !antenv/
            !venv/
            !node_modules/
            !__pycache__/
            !.git/
            !.github/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0154A22D37D1420787C44C3FB38C7E84 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3C023CAEB25249D183BACDD4CD491522 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_56AAA9430B494441ACF25AE55D580272 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'buapapiv1'
          slot-name: 'Production'